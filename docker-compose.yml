version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: invite_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invite_saas"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Run once to apply pending Prisma migrations.
  # Usage: docker compose --profile migrate up migrate
  migrate:
    build:
      context: .
      target: builder   # uses the full node_modules stage
    command: npx prisma migrate deploy
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

volumes:
  postgres_data:
